  is_meta: False
  data_category: att
  cohort_date_format: YYYY_YY # date format for Y11 cohort, e.g. 2025_26
  keywords: 
    - attend
    - attendance
  metadata:
    sources:
      - filename: School data metadata (census, attendance, exclusions).xlsx
        sheetname: Attendance
