# activitySurvey:
#   is_meta: False
#   cohort_date_format: YYYY # 2021 stands for 2020-2021
#   keywords: 
#     - AS Year 11

EXCLUDE:
  # Exclude files if filenames contains value defined in "name_contains" and contains "name_contains" and sheet name contains "sheets_contain"
  description: Data that will not be used in model building
  is_meta: False
  # cohort_date_format: YYYY_YY
  files: 
    - name_contains: RONI UPNs 
      sheets_contain: 
        - Census
        - Cens
    - name_contains: ''
      sheets_contain:
        - Reason Codes
        - All Permanent Excl
        - Fixed Term_Suspensions
        - All Suspensions
        - Permanent Exclusions
        - Perm Exclusions
    - name_contains: AS Year 11 # activitySurvey
    - name_contains: excluded at secondary

#########################################
# mapping for meta data

ethnicity_code:
  is_meta: True
  files: 
    - name: EAL Dashboard Version 2.1 Primary.xlsx
      sheets:
        - name: Ethnicity Breakdown
          skiprows: 4
          columns:
            extended_code: DfE Extended Code
            extended_categories: Approved Extended Categories
            main_code: DfE Main Code
            main_categories: Main Category
            sub_categories: Sub- Category
    # - name: GIAP NPD 2022 v0.4.xlsx
    #   sheets:
    #     - name: Census Ethnicity codes
    # - name: Ethnicity Count Types 170124

school_code:
  description: Contains School Entity Code, UKPRN, and URN (GIAS)
  is_meta: True
  files:
    - name: Entity Codes schools colleges 110624.xlsx
      primary: true # if primary = True, then all data in this file will be kept. Only one file can be set as primary data
      columns:
        # Columns mapping (KEY:VALUE): KEY is the desired column name, VALUE is the column name in the file
        Entity_Code: Ref
        School_Name: Name
        UKPRN: UKPRN
    - name: Provider Dashboard.xlsx
      sheets:
        - name: Data
          primary: False
          columns: # the following columns will be filled or merged into primary data
            UKPRN: UKPRN
            School_Name: School Name (GIAS)
            URN: URN (GIAS)
            DFE_Estab_No: DFE Establishment Number
            Type_Of_Estab: TypeOfEstablishment (name)
            Town: Town
            Street: Street
            Ofsted_Judgement_2: Ofsted Judgement 2
            Postcode: Postcode
            CTE_Group: CTE Group
            Gender: Gender (name)


#########################################
# config for normalise column names 

standardise_colnames_rule:
  standardise_rules:
    - replace: ' '
      to: '_'
    - replace: '-'
      to: '_'
    - replace: 'Student_ID'
      to: 'Stud_ID'
    - replace: 'StudID'
      to: 'Stud_ID'
    - replace: 'NCCISCohort'
      to: 'NCCIS_Cohort'
    - replace: 'SENunitIndicator'
      to: 'SEN_Unit_Indicator'
    - replace: 'SENSupport'
      to: 'SEN_Support'
    - replace: 'SENprovision'
      to: 'SEN_Provision'
    - replace: 'NCyearActual'
      to: 'NC_Year_Actual'
    - replace: 'NCyear'
      to: 'NC_Year'
    - replace: 'SENneed'
      to: 'SEN_Need'
    # - replace: 'noSpeccon'
    #   to: 'no_spec_con'
    # - replace: 'SPECCON'
    #   to: 'SPEC_CON'
    - add_underscore_before_caps: True
    - to_lower: True
  exclude_files: # exclude metadata
    - name: Activity survey metadata.xlsx
    - name: Entity Codes schools colleges 110624.xlsx
    - name: Ethnicity Count Types 170124.xlsx
    - name: Provider Dashboard.xlsx
    - name: EAL Dashboard Version 2.1 Primary.xlsx
    - name: GIAP NPD 2022 v0.4.xlsx
    - name: GIAP 2023 v0.7 Metadata.xlsx
    - name: NCCIS 16to19 data metadata.xlsx
    - name: School data metadata (census, attendance, exclusions).xlsx
